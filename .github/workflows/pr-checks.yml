name: PR - Required Checks Summary

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  summary:
    name: PR Validation Summary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate branch name follows convention
        run: |
          BRANCH="${{ github.head_ref }}"
          PATTERN="^(feat|fix|docs|refactor|chore|test)/.+"
          if [[ ! "$BRANCH" =~ $PATTERN ]]; then
            echo "Branch name '$BRANCH' does not follow convention."
            echo "Expected: feat/<issue>-<name>, fix/<issue>-<name>, etc."
            exit 1
          fi
          echo "Branch name OK: $BRANCH"

      - name: Validate PR title follows Conventional Commits
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          PATTERN="^(feat|fix|docs|refactor|chore|test|style|perf|ci)(\(.+\))?: .+"
          if [[ ! "$TITLE" =~ $PATTERN ]]; then
            echo "PR title '$TITLE' does not follow Conventional Commits."
            echo "Expected: feat: add login endpoint"
            exit 1
          fi
          echo "PR title OK: $TITLE"

      - name: Check PR is not targeting main directly
        run: |
          TARGET="${{ github.base_ref }}"
          if [[ "$TARGET" == "main" ]]; then
            echo "PR targets main. Ensure you have at least one reviewer."
          fi
          echo "Target branch: $TARGET"
