name: CI - Contracts (JSON Schema)

on:
  pull_request:
    paths:
      - "packages/contracts/**"
      - ".github/workflows/ci-contracts.yml"

jobs:
  validate-schemas:
    name: Validate schemas & examples
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/contracts/requirements.txt

      - name: Install dependencies
        run: pip install -r packages/contracts/requirements.txt

      - name: Validate contracts (meta-schema + examples)
        run: python packages/contracts/validate.py
