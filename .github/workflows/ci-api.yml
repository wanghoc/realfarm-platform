name: CI - Backend (FastAPI)

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/ci-api.yml"

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Ruff lint
        working-directory: backend
        continue-on-error: true
        run: ruff check .

      - name: Ruff format check
        working-directory: backend
        continue-on-error: true
        run: ruff format --check .

  migrate-and-import:
    name: Migrations & Import Check
    runs-on: ubuntu-latest
    needs: lint-and-type-check

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: realfarm_ci
          POSTGRES_USER: realfarm
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_TYPE: postgres
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: realfarm_ci
      POSTGRES_USER: realfarm
      POSTGRES_PASSWORD: ci_password
      JWT_SECRET: ci_test_secret_do_not_use_in_prod
      APP_ENV: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      # Runs every migration against a real TimescaleDB, so the measurements
      # hypertable migration (create_hypertable) is exercised in CI, not just
      # SQLite. Uses the `alembic` CLI (not `python -m alembic`, which has no
      # __main__).
      - name: Run database migrations (Alembic + TimescaleDB)
        working-directory: backend
        run: alembic upgrade head

      - name: Verify app imports correctly
        working-directory: backend
        run: python -c "from app.main import app; print('App import OK')"
