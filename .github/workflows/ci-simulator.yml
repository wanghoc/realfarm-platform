name: CI - Simulator & Gateway

on:
  pull_request:
    paths:
      - "backend/services/simulator/**"
      - "backend/services/gateway/**"
      - "backend/services/common/**"
      - ".github/workflows/ci-simulator.yml"

jobs:
  import-check:
    name: Import Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/services/simulator/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/services/simulator/requirements.txt
          pip install -r backend/services/gateway/requirements.txt

      # Run from the services root so the shared `common` package is importable,
      # matching the Docker build (context backend/services) and the standalone
      # `python -m simulator.src.main` documented in the service READMEs.
      - name: Verify simulator & gateway import
        working-directory: backend/services
        run: |
          python -c "import simulator.src.main; print('Simulator import OK')"
          python -c "import gateway.src.main; print('Gateway import OK')"
