# RealFarm MQTT broker (Eclipse Mosquitto 2.x).
# Every RealFarm topic uses QoS 1 (at-least-once); see infra/mqtt/README.md.

listener 1883
allow_anonymous true

listener 9001
protocol websockets
allow_anonymous true

# QoS 1 durability: keep in-flight and queued messages across a broker restart so a
# message accepted from a publisher is not lost when the broker bounces.
persistence true
persistence_location /mosquitto/data/
autosave_interval 60

# Per-client QoS>0 flow control.
max_inflight_messages 20
max_queued_messages 1000
